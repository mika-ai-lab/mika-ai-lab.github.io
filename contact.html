<!DOCTYPE html>
<html lang="ja">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>お問い合わせ — Mika AI Lab</title>
<link rel="stylesheet" href="style.css">
<style>
.form-wrap { max-width: 600px; }
.form-group { margin-bottom: 24px; }
label { display: block; font-size: 0.9em; font-weight: bold; margin-bottom: 8px; }
label span { color: #e00; margin-left: 4px; font-size: 0.85em; }
input, select, textarea {
  width: 100%; padding: 12px 16px;
  border: 1px solid #ccc; border-radius: 6px;
  font-size: 1em; font-family: inherit;
  transition: border 0.2s;
}
input:focus, select:focus, textarea:focus {
  outline: none; border-color: #1a1a1a;
}
textarea { height: 160px; resize: vertical; }
.submit-btn {
  background: #1a1a1a; color: #fff;
  border: none; padding: 14px 40px;
  border-radius: 6px; font-size: 1em;
  font-weight: bold; cursor: pointer;
  width: 100%;
}
.submit-btn:hover { background: #333; }
.form-note { font-size: 0.82em; color: #888; margin-top: 12px; }
.success-msg { display:none; background:#f0fff8; border:1px solid #41c9b4; border-radius:8px; padding:24px; text-align:center; margin-top:24px; }
</style>
</head>
<body>
<header>
  <div class="header-inner">
    <div class="logo"><a href="index.html">🤖 Mika AI Lab</a><span>AIの最前線を、わかりやすく。</span></div>
    <nav>
      <a href="index.html">記事</a>
      <a href="about.html">About</a>
      <a href="https://note.com/mika_ai" target="_blank">note</a>
      <a href="https://www.youtube.com/channel/UCh2tImp-N_z3zmiNdkvVjBQ" target="_blank">YouTube</a>
    </nav>
  </div>
</header>
<main>
  <div class="article-title">お問い合わせ</div>
  <p style="margin-bottom:32px;color:#555;">AI研修・AI導入コンサル・AIシステム開発のご相談はこちらから。<br>初回30分の無料相談を実施中です。お気軽にどうぞ。</p>

  <div class="form-wrap">
    <form action="https://formspree.io/f/xqegkovj" method="POST" id="contactForm">
      <div class="form-group">
        <label>お名前<span>必須</span></label>
        <input type="text" name="name" placeholder="山田 太郎" required>
      </div>
      <div class="form-group">
        <label>会社名・組織名</label>
        <input type="text" name="company" placeholder="株式会社〇〇（個人の場合は「個人」）">
      </div>
      <div class="form-group">
        <label>メールアドレス<span>必須</span></label>
        <input type="email" name="email" placeholder="example@company.com" required>
      </div>
      <div class="form-group">
        <label>お問い合わせ種別<span>必須</span></label>
        <select name="type" required>
          <option value="">選択してください</option>
          <option value="AI研修・セミナー">AI研修・セミナー（企業向け）</option>
          <option value="AI導入コンサル">AI導入コンサルティング</option>
          <option value="AIシステム開発">AIシステム開発</option>
          <option value="個人向け教程">個人向け教程・講座</option>
          <option value="その他">その他</option>
        </select>
      </div>
      <div class="form-group">
        <label>お問い合わせ内容<span>必須</span></label>
        <textarea name="message" placeholder="ご相談内容をご記入ください。" required></textarea>
      </div>
      <input type="hidden" name="_subject" value="【Mika AI Lab】お問い合わせがありました">
      <input type="text" name="_gotcha" style="display:none">
      <button type="submit" class="submit-btn">送信する</button>
      <p class="form-note">※ 通常2営業日以内にご返信いたします。</p>
    </form>

    <div class="success-msg" id="successMsg">
      <p style="font-size:1.4em;margin-bottom:8px;">✅ 送信完了！</p>
      <p>お問い合わせありがとうございます。<br>2営業日以内にご連絡いたします。</p>
    </div>
  </div>
</main>
<footer>
  © 2026 Mika AI Lab · <a href="https://note.com/mika_ai">note</a> · <a href="https://x.com/MikaAI_Lab">X</a> · <a href="https://www.youtube.com/channel/UCh2tImp-N_z3zmiNdkvVjBQ">YouTube</a>
</footer>
<script>
const form = document.getElementById('contactForm');
form.addEventListener('submit', async function(e) {
  e.preventDefault();
  const data = new FormData(form);
  const res = await fetch(form.action, { method:'POST', body:data, headers:{Accept:'application/json'} });
  if(res.ok) {
    form.style.display = 'none';
    document.getElementById('successMsg').style.display = 'block';
  } else {
    alert('送信に失敗しました。時間をおいて再度お試しください。');
  }
});
</script>
</body>
</html>
